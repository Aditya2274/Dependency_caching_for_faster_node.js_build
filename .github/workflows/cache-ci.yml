name: Node.js CI with cache
on:
    push:
    pull_request:
jobs:
    test-with_cache:
        runs-on: ubuntu
        steps:
            - name: Check out repository code
              uses: actions/checkout@v5
            - name: setup node.js with npm cache
              uses: actions/setup-node@v5
              with:
                node-version: 24
                cache: npm
            - name: Install dependencies
              run: npm ci
            - name: Run tests
              run: npm test
        